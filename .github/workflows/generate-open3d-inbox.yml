name: Generate Open3D asset inbox

on:
  push:
    branches: [main]
    paths:
      - "assets/asset_inbox/**"
      - "tools/open3d_inbox.py"
      - "tools/triposr_generate.py"
      - "tools/triposr_blender_postprocess.py"
      - "tools/setup_triposr_runner.sh"
      - ".github/workflows/generate-open3d-inbox.yml"
  workflow_dispatch:
    inputs:
      mode:
        description: Validate the inbox or generate GLB files on the local GPU runner
        required: true
        default: validate
        type: choice
        options: [validate, generate]
      asset:
        description: Optional image stem to process; empty means every inbox image
        required: false
        default: ""
        type: string
      bootstrap_runner:
        description: Install or update TripoSR before generation
        required: true
        default: "false"
        type: choice
        options: ["false", "true"]

permissions:
  contents: write

concurrency:
  group: open3d-inbox-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate image inbox and zero-key pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install validation dependencies
        run: python3 -m pip install --quiet --disable-pip-version-check cairosvg

      - name: Compile pipeline scripts
        run: |
          set -euo pipefail
          python3 -m py_compile \
            tools/open3d_inbox.py \
            tools/triposr_generate.py \
            tools/triposr_blender_postprocess.py
          bash -n tools/setup_triposr_runner.sh

      - name: Validate every concept image
        shell: bash
        env:
          REQUESTED_ASSET: ${{ github.event.inputs.asset }}
        run: |
          set -euo pipefail
          args=(
            --inbox assets/asset_inbox
            --output-root build/open3d-inbox
            --validate-only
          )
          if [ -n "${REQUESTED_ASSET:-}" ]; then
            args+=(--asset "$REQUESTED_ASSET")
          fi
          python3 tools/open3d_inbox.py "${args[@]}"
          test -s build/open3d-inbox/catalog.json

      - name: Upload validation reports
        uses: actions/upload-artifact@v4
        with:
          name: open3d-inbox-validation-${{ github.run_id }}
          path: build/open3d-inbox
          retention-days: 14

  generate:
    name: Generate, test and integrate GLB files
    needs: validate
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' &&
        github.event.inputs.mode == 'generate' &&
        github.ref == 'refs/heads/main' &&
        github.actor == github.repository_owner
      }}
    runs-on: [self-hosted, linux, x64, gpu, triposr]
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Verify generation host
        run: |
          set -euo pipefail
          python3 --version
          blender --version | head -n 1
          nvidia-smi

      - name: Install inbox dependencies
        run: python3 -m pip install --quiet --disable-pip-version-check cairosvg

      - name: Bootstrap TripoSR
        if: ${{ github.event.inputs.bootstrap_runner == 'true' }}
        run: |
          set -euo pipefail
          chmod +x tools/setup_triposr_runner.sh
          tools/setup_triposr_runner.sh

      - name: Generate Godot-ready GLB candidates
        shell: bash
        env:
          REQUESTED_ASSET: ${{ github.event.inputs.asset }}
          TRIPOSR_HOME_CONFIG: ${{ vars.TRIPOSR_HOME }}
        run: |
          set -euo pipefail
          args=(
            --inbox assets/asset_inbox
            --output-root build/open3d-inbox
            --production-root assets/production/generated
            --triposr-home "${TRIPOSR_HOME_CONFIG:-$HOME/opt/TripoSR}"
          )
          if [ -n "${REQUESTED_ASSET:-}" ]; then
            args+=(--asset "$REQUESTED_ASSET")
          fi
          python3 tools/open3d_inbox.py "${args[@]}"
          find assets/production -type f -name '*.glb' -size +0c -print -quit | grep -q .

      - name: Assemble and lint gameplay
        run: |
          set -euo pipefail
          python3 -m pip install --quiet --disable-pip-version-check gdtoolkit
          mkdir -p scripts build/web
          cat src_parts/main_*.gdpart > scripts/main.gd
          gdlint scripts/main.gd

      - name: Import, run and export with Godot 4.7
        shell: bash
        run: |
          set -euo pipefail
          tag="4.7-stable"
          curl -fsSL --retry 5 --retry-delay 3 -o godot.zip "https://github.com/godotengine/godot/releases/download/${tag}/Godot_v${tag}_linux.x86_64.zip"
          curl -fsSL --retry 5 --retry-delay 3 -o templates.tpz "https://github.com/godotengine/godot/releases/download/${tag}/Godot_v${tag}_export_templates.tpz"
          mkdir -p .godot-bin .templates
          unzip -q godot.zip -d .godot-bin
          unzip -q templates.tpz -d .templates
          GODOT_BIN="$(find .godot-bin -maxdepth 1 -type f -name 'Godot*' | head -n 1)"
          chmod +x "$GODOT_BIN"
          template_dir="$HOME/.local/share/godot/export_templates/4.7.stable"
          mkdir -p "$template_dir"
          cp -a .templates/templates/. "$template_dir/"
          timeout 180 "$GODOT_BIN" --headless --editor --path . --quit-after 12 > build/open3d-godot-import.log 2>&1
          timeout 45 "$GODOT_BIN" --headless --path . --quit-after 20 > build/open3d-godot-runtime.log 2>&1
          grep -q 'BLACKOUT_RUNTIME_READY' build/open3d-godot-runtime.log
          if grep -Eqi 'SCRIPT ERROR|Invalid call|Invalid get index|Attempt to call|ERROR:' build/open3d-godot-runtime.log; then
            cat build/open3d-godot-runtime.log
            exit 1
          fi
          "$GODOT_BIN" --headless --path . --export-release Web build/web/index.html > build/open3d-godot-export.log 2>&1
          test -s build/web/index.html
          test -s build/web/index.wasm
          test -s build/web/index.pck

      - name: Commit validated assets to main
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "blackout-open3d-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/production
          if git diff --cached --quiet; then
            echo "No generated asset changed."
            exit 0
          fi
          git commit -m "Integrate validated Open3D assets from inbox"
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Upload generation diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: open3d-inbox-generation-${{ github.run_id }}
          path: |
            build/open3d-inbox
            build/open3d-godot-import.log
            build/open3d-godot-runtime.log
            build/open3d-godot-export.log
          if-no-files-found: warn
          retention-days: 14
