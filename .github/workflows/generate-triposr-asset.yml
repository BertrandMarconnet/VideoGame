name: Generate open-source 3D asset (TripoSR)

on:
  workflow_dispatch:
    inputs:
      manifest_path:
        description: Repository path to the TripoSR JSON manifest
        required: true
        default: assets/concepts/specter_5/triposr.json
        type: string
      mode:
        description: Validate on a GitHub runner, or generate on the local GPU runner
        required: true
        default: validate
        type: choice
        options:
          - validate
          - generate
      bootstrap_runner:
        description: Install/update TripoSR dependencies on the self-hosted runner
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

concurrency:
  group: triposr-${{ github.ref }}-${{ inputs.manifest_path }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate open-source 3D pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      MANIFEST_PATH: ${{ inputs.manifest_path }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile pipeline scripts
        run: |
          set -euo pipefail
          python3 -m py_compile \
            tools/triposr_generate.py \
            tools/triposr_blender_postprocess.py
          bash -n tools/setup_triposr_runner.sh

      - name: Validate pipeline smoke manifest
        run: |
          set -euo pipefail
          python3 tools/triposr_generate.py \
            --manifest tools/testdata/triposr_manifest_smoke.json \
            --validate-only \
            --output-root build/triposr-smoke

      - name: Validate requested asset manifest
        run: |
          set -euo pipefail
          python3 tools/triposr_generate.py \
            --manifest "$MANIFEST_PATH" \
            --validate-only \
            --output-root build/triposr-validation

      - name: Add validation report to summary
        if: always()
        run: |
          set -euo pipefail
          if find build -name github-summary.md -type f -print -quit 2>/dev/null | grep -q .; then
            while IFS= read -r summary; do
              cat "$summary" >> "$GITHUB_STEP_SUMMARY"
              printf '\n' >> "$GITHUB_STEP_SUMMARY"
            done < <(find build -name github-summary.md -type f | sort)
          fi

      - name: Upload validation reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: triposr-validation-${{ github.run_id }}
          path: |
            build/triposr-smoke
            build/triposr-validation
          if-no-files-found: warn
          retention-days: 14

  generate:
    name: Generate and optimize GLB on local GPU
    needs: validate
    if: >-
      ${{
        inputs.mode == 'generate' &&
        github.ref == 'refs/heads/main' &&
        github.actor == github.repository_owner
      }}
    runs-on: [self-hosted, linux, x64, gpu, triposr]
    timeout-minutes: 180
    env:
      MANIFEST_PATH: ${{ inputs.manifest_path }}
      TRIPOSR_HOME_CONFIG: ${{ vars.TRIPOSR_HOME }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify local GPU runner
        run: |
          set -euo pipefail
          uname -a
          python3 --version
          blender --version | head -n 1
          nvidia-smi

      - name: Bootstrap or update TripoSR
        if: ${{ inputs.bootstrap_runner == 'true' }}
        run: |
          set -euo pipefail
          chmod +x tools/setup_triposr_runner.sh
          tools/setup_triposr_runner.sh

      - name: Generate, decimate and export GLB
        run: |
          set -euo pipefail
          TRIPOSR_HOME_EFFECTIVE="${TRIPOSR_HOME_CONFIG:-$HOME/opt/TripoSR}"
          python3 tools/triposr_generate.py \
            --manifest "$MANIFEST_PATH" \
            --triposr-home "$TRIPOSR_HOME_EFFECTIVE" \
            --output-root build/triposr

      - name: Add generation report to summary
        if: always()
        run: |
          set -euo pipefail
          if find build/triposr -name github-summary.md -type f -print -quit 2>/dev/null | grep -q .; then
            while IFS= read -r summary; do
              cat "$summary" >> "$GITHUB_STEP_SUMMARY"
              printf '\n' >> "$GITHUB_STEP_SUMMARY"
            done < <(find build/triposr -name github-summary.md -type f | sort)
          else
            echo '## TripoSR pipeline' >> "$GITHUB_STEP_SUMMARY"
            echo 'No generation report was produced. Inspect the failed step.' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload generated asset for manual review
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: triposr-${{ github.run_id }}
          path: build/triposr
          if-no-files-found: warn
          retention-days: 14
