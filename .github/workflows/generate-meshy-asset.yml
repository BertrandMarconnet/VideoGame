name: Generate Meshy 3D asset

on:
  workflow_dispatch:
    inputs:
      manifest_path:
        description: Repository path to the Meshy JSON manifest
        required: true
        default: assets/concepts/specter_5/meshy.json
        type: string
      mode:
        description: Validate inputs without credits, or call the Meshy API
        required: true
        default: validate
        type: choice
        options:
          - validate
          - generate
      timeout_minutes:
        description: Maximum Meshy generation wait time
        required: true
        default: "45"
        type: string
      poll_seconds:
        description: Meshy task polling interval
        required: true
        default: "10"
        type: string

permissions:
  contents: read

concurrency:
  group: meshy-${{ github.ref }}-${{ inputs.manifest_path }}
  cancel-in-progress: false

jobs:
  generate:
    name: Validate or generate Meshy asset
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      MESHY_API_KEY: ${{ secrets.MESHY_API_KEY }}
      MANIFEST_PATH: ${{ inputs.manifest_path }}
      PIPELINE_MODE: ${{ inputs.mode }}
      TIMEOUT_MINUTES: ${{ inputs.timeout_minutes }}
      POLL_SECONDS: ${{ inputs.poll_seconds }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate pipeline tooling without API credits
        shell: bash
        run: |
          set -euo pipefail
          python3 -m py_compile tools/meshy_generate.py
          python3 tools/meshy_generate.py \
            --manifest tools/testdata/meshy_manifest_smoke.json \
            --validate-only \
            --output-root build/meshy-smoke

      - name: Check requested manifest and secret
        shell: bash
        run: |
          set -euo pipefail
          test -f "$MANIFEST_PATH" || {
            echo "Manifest not found: $MANIFEST_PATH"
            exit 2
          }
          case "$PIPELINE_MODE" in
            validate|generate) ;;
            *) echo "Unsupported mode: $PIPELINE_MODE"; exit 2 ;;
          esac
          if [ "$PIPELINE_MODE" = "generate" ] && [ -z "${MESHY_API_KEY:-}" ]; then
            echo "MESHY_API_KEY is missing. Add it in Settings > Secrets and variables > Actions."
            exit 2
          fi

      - name: Run Meshy pipeline
        shell: bash
        run: |
          set -euo pipefail
          args=(
            --manifest "$MANIFEST_PATH"
            --output-root build/meshy
            --timeout-minutes "$TIMEOUT_MINUTES"
            --poll-seconds "$POLL_SECONDS"
          )
          if [ "$PIPELINE_MODE" = "validate" ]; then
            args+=(--validate-only)
          fi
          python3 tools/meshy_generate.py "${args[@]}"

      - name: Add pipeline report to job summary
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if find build/meshy -name github-summary.md -type f -print -quit 2>/dev/null | grep -q .; then
            while IFS= read -r summary; do
              cat "$summary" >> "$GITHUB_STEP_SUMMARY"
              printf '\n' >> "$GITHUB_STEP_SUMMARY"
            done < <(find build/meshy -name github-summary.md -type f | sort)
          else
            {
              echo '## Meshy pipeline'
              echo
              echo 'No result summary was produced. Inspect the failed step above.'
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload generated asset for manual review
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: meshy-${{ github.run_id }}
          path: |
            build/meshy
            build/meshy-smoke
          if-no-files-found: warn
          retention-days: 14
