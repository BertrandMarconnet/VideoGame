name: Validate turnkey 3D pipeline

on:
  push:
    branches: [main]
    paths:
      - ".github/ISSUE_TEMPLATE/generate-3d.yml"
      - ".github/workflows/generate-3d-model.yml"
      - ".github/workflows/validate-3d-pipeline.yml"
      - "tools/input_image_to_glb.py"
      - "tools/prepare_3d_issue_request.py"
      - "tools/triposr_*.py"
      - "tools/setup_triposr_cpu.sh"
      - "assets/Input image/**"
      - "docs/TRIPOSR_GITHUB_PIPELINE.md"
  pull_request:
    branches: [main]
    paths:
      - ".github/ISSUE_TEMPLATE/generate-3d.yml"
      - ".github/workflows/generate-3d-model.yml"
      - ".github/workflows/validate-3d-pipeline.yml"
      - "tools/input_image_to_glb.py"
      - "tools/prepare_3d_issue_request.py"
      - "tools/triposr_*.py"
      - "tools/setup_triposr_cpu.sh"
      - "assets/Input image/**"
      - "docs/TRIPOSR_GITHUB_PIPELINE.md"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install validation dependencies
        run: python3 -m pip install --quiet 'Pillow==10.1.0' 'PyYAML==6.0.2'

      - name: Validate YAML, Python and shell tools
        shell: bash
        run: |
          set -euo pipefail
          python3 -m py_compile \
            tools/input_image_to_glb.py \
            tools/prepare_3d_issue_request.py \
            tools/triposr_generate.py \
            tools/triposr_blender_postprocess.py
          bash -n tools/setup_triposr_cpu.sh
          python3 - <<'PY'
          import yaml
          for path in (
              '.github/ISSUE_TEMPLATE/generate-3d.yml',
              '.github/workflows/generate-3d-model.yml',
              '.github/workflows/validate-3d-pipeline.yml',
          ):
              with open(path, encoding='utf-8') as handle:
                  yaml.safe_load(handle)
              print('YAML OK:', path)
          PY

      - name: Validate SPECTER-5 one-click input
        shell: bash
        run: |
          set -euo pipefail
          python3 tools/input_image_to_glb.py \
            --backend triposr \
            --input-root "assets/Input image" \
            --output-root build/validated-output \
            --work-root build/turnkey-validation \
            --asset specter_5 \
            --validate-only
          test -s build/turnkey-validation/catalog.json

      - name: Validate the simple issue interface
        shell: bash
        run: |
          set -euo pipefail
          cat > build/mock-issue.md <<'EOF_ISSUE'
          ### Nom du modèle

          SPECTER-5

          ### Images déjà présentes dans le dépôt

          specter_5

          ### Images du modèle

          _No response_

          ### Hauteur souhaitée en mètres

          2.45

          ### Qualité

          Rapide — recommandé pour le premier essai
          EOF_ISSUE
          GITHUB_OUTPUT=build/mock-output.txt python3 tools/prepare_3d_issue_request.py \
            --body-file build/mock-issue.md \
            --title "[3D] SPECTER-5" \
            --repository-input "assets/Input image" \
            --request-root build/mock-input
          grep -q '^asset_slug=specter_5$' build/mock-output.txt
          test -s build/mock-input/specter_5/asset.json
          test -s build/mock-input/specter_5/three_quarter.jpg

      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: turnkey-3d-validation-${{ github.run_id }}
          path: |
            build/turnkey-validation
            build/mock-input
            build/mock-output.txt
          if-no-files-found: warn
          retention-days: 7
