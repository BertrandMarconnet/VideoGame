name: Build Godot Web and deploy GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Assemble and inspect gameplay source
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p scripts build/web
          cat src_parts/main_*.gdpart > scripts/main.gd
          test -s scripts/main.gd
          test "$(grep -c '^func ' scripts/main.gd)" -ge 45
          grep -q 'func _build_factory' scripts/main.gd
          grep -q 'func _build_mobile_controls' scripts/main.gd
          grep -q 'func _update_specter' scripts/main.gd
          grep -q 'func _update_crawler' scripts/main.gd
          grep -q 'func _break_destructible' scripts/main.gd
          grep -q 'func _activate_terminal' scripts/main.gd

      - name: Install validation tools
        run: python -m pip install --quiet --disable-pip-version-check gdtoolkit

      - name: Validate GDScript
        run: gdlint scripts/main.gd

      - name: Download Godot 4.7 stable and official export templates
        shell: bash
        run: |
          set -euo pipefail
          GODOT_TAG="4.7-stable"
          curl -fsSL --retry 5 --retry-delay 3 -o godot.zip "https://github.com/godotengine/godot/releases/download/${GODOT_TAG}/Godot_v${GODOT_TAG}_linux.x86_64.zip"
          curl -fsSL --retry 5 --retry-delay 3 -o templates.tpz "https://github.com/godotengine/godot/releases/download/${GODOT_TAG}/Godot_v${GODOT_TAG}_export_templates.tpz"
          mkdir -p .godot-bin .templates
          unzip -q godot.zip -d .godot-bin
          unzip -q templates.tpz -d .templates
          GODOT_BIN="$(find .godot-bin -maxdepth 1 -type f -name 'Godot*' | head -n 1)"
          test -n "$GODOT_BIN"
          chmod +x "$GODOT_BIN"
          echo "GODOT_BIN=$GODOT_BIN" >> "$GITHUB_ENV"
          TEMPLATE_DIR="$HOME/.local/share/godot/export_templates/4.7.stable"
          mkdir -p "$TEMPLATE_DIR"
          cp -a .templates/templates/. "$TEMPLATE_DIR/"
          test -s "$TEMPLATE_DIR/web_release.zip"
          "$GODOT_BIN" --version

      - name: Import project and validate Godot resources
        shell: bash
        run: |
          set +e
          timeout 180 "$GODOT_BIN" --headless --editor --path . --quit-after 8 > godot-import.log 2>&1
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            tail -n 160 godot-import.log
            exit "$status"
          fi
          tail -n 30 godot-import.log
          test -d .godot

      - name: Export Web
        shell: bash
        run: |
          set +e
          "$GODOT_BIN" --headless --path . --export-release Web build/web/index.html > godot-export.log 2>&1
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            tail -n 200 godot-export.log
            exit "$status"
          fi
          tail -n 50 godot-export.log
          touch build/web/.nojekyll
          test -s build/web/index.html
          test -s build/web/index.wasm
          test -s build/web/index.pck
          printf 'User-agent: *\nAllow: /\n' > build/web/robots.txt
          find build/web -maxdepth 1 -type f -printf '%f %s bytes\n' | sort

      - name: Upload Godot diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: godot-diagnostics-${{ github.run_id }}
          path: |
            godot-import.log
            godot-export.log
          if-no-files-found: warn

      - name: Configure GitHub Pages
        if: github.event_name == 'push' && success()
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload GitHub Pages artifact
        if: github.event_name == 'push' && success()
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    if: github.event_name == 'push'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  smoke-test:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Checkout main for deployment certificate
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Verify the public game files
        shell: bash
        env:
          PAGE_URL: ${{ needs.deploy.outputs.page_url }}
        run: |
          set -euo pipefail
          test -n "$PAGE_URL"
          base="${PAGE_URL%/}"
          for attempt in $(seq 1 12); do
            if curl -fsSL --max-time 40 "$PAGE_URL" -o deployed-index.html; then
              break
            fi
            if [ "$attempt" -eq 12 ]; then
              echo "The deployed index page is not reachable."
              exit 1
            fi
            sleep 10
          done
          grep -qi 'Blackout Protocol' deployed-index.html
          curl -fsSL --max-time 60 --range 0-63 "$base/index.wasm" -o /dev/null
          curl -fsSL --max-time 60 --range 0-63 "$base/index.pck" -o /dev/null

      - name: Record successful deployment
        shell: bash
        env:
          PAGE_URL: ${{ needs.deploy.outputs.page_url }}
        run: |
          set -euo pipefail
          cat > DEPLOYMENT_STATUS.md <<EOF
          # Déploiement vérifié

          - **État :** jeu Web accessible
          - **URL :** ${PAGE_URL}
          - **Commit déployé :** ${GITHUB_SHA}
          - **Contrôles :** index.html, index.wasm et index.pck accessibles
          - **Vérifié le :** $(date -u +'%Y-%m-%d %H:%M:%S UTC')
          EOF
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add DEPLOYMENT_STATUS.md
          git commit -m "Record successful Pages smoke test [skip ci]"
          git push origin HEAD:main
