name: Build Godot Web and deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore Godot project
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p project
          cat source/part_*.b64 | base64 --decode > project.tar.gz
          tar -xzf project.tar.gz -C project
          test -s project/project.godot

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y curl jq unzip

      - name: Download latest stable Godot and export templates
        shell: bash
        run: |
          set -euo pipefail
          TAG="$(curl -fsSL https://api.github.com/repos/godotengine/godot/releases/latest | jq -r '.tag_name')"
          test -n "$TAG" && test "$TAG" != "null"
          echo "Using Godot $TAG"
          curl -fL --retry 4 -o godot.zip "https://github.com/godotengine/godot/releases/download/${TAG}/Godot_v${TAG}_linux.x86_64.zip"
          curl -fL --retry 4 -o templates.tpz "https://github.com/godotengine/godot/releases/download/${TAG}/Godot_v${TAG}_export_templates.tpz"
          unzip -q godot.zip -d .godot-bin
          GODOT_BIN="$(find .godot-bin -maxdepth 1 -type f -name 'Godot*' | head -n 1)"
          chmod +x "$GODOT_BIN"
          echo "GODOT_BIN=$GODOT_BIN" >> "$GITHUB_ENV"
          VERSION="${TAG%-stable}"
          mkdir -p "$HOME/.local/share/godot/export_templates/${VERSION}.stable"
          unzip -q templates.tpz -d .templates
          cp -a .templates/templates/. "$HOME/.local/share/godot/export_templates/${VERSION}.stable/"

      - name: Import project
        run: timeout 180 "$GODOT_BIN" --headless --path project --editor --quit-after 20

      - name: Export Web/PWA
        run: |
          mkdir -p project/build/web
          "$GODOT_BIN" --headless --path project --export-release Web build/web/index.html
          touch project/build/web/.nojekyll
          test -s project/build/web/index.html
          test -s project/build/web/index.wasm
          test -s project/build/web/index.pck

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: project/build/web

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
