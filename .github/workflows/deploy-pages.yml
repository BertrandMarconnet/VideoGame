name: Build Godot Web and deploy GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  statuses: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Assemble and inspect gameplay source
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p scripts build/web
          cat src_parts/main_*.gdpart > scripts/main.gd
          test -s scripts/main.gd
          test "$(grep -c '^func ' scripts/main.gd)" -ge 70
          grep -q 'func _build_factory' scripts/main.gd
          grep -q 'func _build_mobile_controls' scripts/main.gd
          grep -q 'func _update_specter' scripts/main.gd
          grep -q 'func _update_crawler' scripts/main.gd
          grep -q 'func _break_destructible' scripts/main.gd
          grep -q 'func _activate_terminal' scripts/main.gd
          grep -q 'func _build_v12_ui' scripts/main.gd
          grep -q 'func _start_intro_v12' scripts/main.gd
          grep -q 'func _toggle_tablet_v12' scripts/main.gd
          grep -q 'func _open_context_menu_v12' scripts/main.gd
          grep -q 'func _update_factory_population_v12' scripts/main.gd
          grep -q 'func _athena_speak_v12' scripts/main.gd
          grep -q 'func _update_suno_audio_v14' scripts/main.gd
          grep -q 'func _build_boot_overlay_v15' scripts/main.gd
          grep -q 'BLACKOUT_RUNTIME_READY' scripts/main.gd

      - name: Install validation tools
        run: python -m pip install --quiet --disable-pip-version-check gdtoolkit

      - name: Validate GDScript
        shell: bash
        run: |
          set +e
          gdlint scripts/main.gd > gdlint.log 2>&1
          status=$?
          set -e
          cat gdlint.log
          exit "$status"

      - name: Download Godot 4.7 stable and official export templates
        shell: bash
        run: |
          set -euo pipefail
          GODOT_TAG="4.7-stable"
          curl -fsSL --retry 5 --retry-delay 3 -o godot.zip "https://github.com/godotengine/godot/releases/download/${GODOT_TAG}/Godot_v${GODOT_TAG}_linux.x86_64.zip"
          curl -fsSL --retry 5 --retry-delay 3 -o templates.tpz "https://github.com/godotengine/godot/releases/download/${GODOT_TAG}/Godot_v${GODOT_TAG}_export_templates.tpz"
          mkdir -p .godot-bin .templates
          unzip -q godot.zip -d .godot-bin
          unzip -q templates.tpz -d .templates
          GODOT_BIN="$(find .godot-bin -maxdepth 1 -type f -name 'Godot*' | head -n 1)"
          test -n "$GODOT_BIN"
          chmod +x "$GODOT_BIN"
          echo "GODOT_BIN=$GODOT_BIN" >> "$GITHUB_ENV"
          TEMPLATE_DIR="$HOME/.local/share/godot/export_templates/4.7.stable"
          mkdir -p "$TEMPLATE_DIR"
          cp -a .templates/templates/. "$TEMPLATE_DIR/"
          test -s "$TEMPLATE_DIR/web_release.zip"
          "$GODOT_BIN" --version

      - name: Import project and validate Godot resources
        shell: bash
        run: |
          set +e
          timeout 180 "$GODOT_BIN" --headless --editor --path . --quit-after 12 > godot-import.log 2>&1
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            tail -n 200 godot-import.log
            exit "$status"
          fi
          tail -n 40 godot-import.log
          test -d .godot

      - name: Run native startup smoke test
        shell: bash
        run: |
          set +e
          timeout 45 "$GODOT_BIN" --headless --path . --quit-after 20 > godot-runtime.log 2>&1
          status=$?
          set -e
          cat godot-runtime.log
          if [ "$status" -ne 0 ]; then
            exit "$status"
          fi
          grep -q 'BLACKOUT_RUNTIME_READY' godot-runtime.log
          if grep -Eqi 'SCRIPT ERROR|Invalid call|Invalid get index|Attempt to call|ERROR:' godot-runtime.log; then
            echo 'Runtime errors detected.'
            exit 1
          fi

      - name: Export Web
        shell: bash
        run: |
          set +e
          "$GODOT_BIN" --headless --path . --export-release Web build/web/index.html > godot-export.log 2>&1
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            tail -n 240 godot-export.log
            exit "$status"
          fi
          tail -n 70 godot-export.log
          touch build/web/.nojekyll
          test -s build/web/index.html
          test -s build/web/index.wasm
          test -s build/web/index.pck
          printf 'User-agent: *\nAllow: /\n' > build/web/robots.txt
          find build/web -maxdepth 1 -type f -printf '%f %s bytes\n' | sort

      - name: Install Firefox Web test
        shell: bash
        run: |
          set -euo pipefail
          npm install --no-save playwright@1.55.0 pngjs@7.0.0
          npx playwright install --with-deps firefox

      - name: Run exported game in Firefox
        shell: bash
        run: |
          set -euo pipefail
          python3 -m http.server 8080 --directory build/web > build/http-server.log 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid" 2>/dev/null || true' EXIT
          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8080/ -o /dev/null; then
              break
            fi
            if [ "$attempt" -eq 30 ]; then
              echo 'Local Web server did not start.'
              exit 1
            fi
            sleep 1
          done
          BLACKOUT_TEST_URL=http://127.0.0.1:8080/ node tools/firefox_smoke.mjs
          test -s build/firefox-smoke.png
          test -s build/firefox-console.log
          cat build/firefox-console.log

      - name: Upload Godot and Firefox diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: godot-firefox-diagnostics-${{ github.run_id }}
          path: |
            gdlint.log
            godot-import.log
            godot-runtime.log
            godot-export.log
            build/firefox-console.log
            build/firefox-smoke.png
            build/http-server.log
          if-no-files-found: warn

      - name: Publish build validation status
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
        run: |
          set -euo pipefail
          if [ "$JOB_STATUS" = "success" ]; then
            state="success"
            description="Godot 4.7 and Firefox Web canvas validated"
          else
            state="failure"
            description="Godot or Firefox Web validation failed"
          fi
          curl --fail-with-body -sS -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" \
            -d "{\"state\":\"$state\",\"context\":\"blackout/firefox-web\",\"description\":\"$description\",\"target_url\":\"$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID\"}"

      - name: Configure GitHub Pages
        if: github.event_name == 'push' && success()
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload GitHub Pages artifact
        if: github.event_name == 'push' && success()
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    if: github.event_name == 'push'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  smoke-test:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Verify the public game files
        shell: bash
        env:
          PAGE_URL: ${{ needs.deploy.outputs.page_url }}
        run: |
          set -euo pipefail
          test -n "$PAGE_URL"
          base="${PAGE_URL%/}"
          for attempt in $(seq 1 12); do
            if curl -fsSL --max-time 40 "$PAGE_URL" -o deployed-index.html; then
              break
            fi
            if [ "$attempt" -eq 12 ]; then
              echo "The deployed index page is not reachable."
              exit 1
            fi
            sleep 10
          done
          grep -qi 'Blackout Protocol' deployed-index.html
          curl -fsSL --max-time 60 --range 0-63 "$base/index.wasm" -o /dev/null
          curl -fsSL --max-time 60 --range 0-63 "$base/index.pck" -o /dev/null
          {
            echo '## Déploiement vérifié'
            echo
            echo "- Jeu Web accessible : $PAGE_URL"
            echo "- Commit déployé : $GITHUB_SHA"
            echo '- index.html, index.wasm et index.pck accessibles'
            echo '- Export validé dans Firefox avant publication'
          } >> "$GITHUB_STEP_SUMMARY"
