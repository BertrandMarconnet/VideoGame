name: Build Godot Web and deploy GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install validation tools
        run: |
          python -m pip install --quiet --upgrade pip
          python -m pip install --quiet gdtoolkit
          sudo apt-get update -qq
          sudo apt-get install -y -qq unzip >/dev/null

      - name: Validate project source
        run: python project/tools/validate_project.py

      - name: Install Godot 4.7 and export templates
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL --retry 4 -o godot.zip https://github.com/godotengine/godot/releases/download/4.7-stable/Godot_v4.7-stable_linux.x86_64.zip
          curl -fsSL --retry 4 -o templates.tpz https://github.com/godotengine/godot/releases/download/4.7-stable/Godot_v4.7-stable_export_templates.tpz
          mkdir -p .godot-bin .templates "$HOME/.local/share/godot/export_templates/4.7.stable"
          unzip -q godot.zip -d .godot-bin
          unzip -q templates.tpz -d .templates
          cp -a .templates/templates/. "$HOME/.local/share/godot/export_templates/4.7.stable/"
          GODOT_BIN="$(find .godot-bin -maxdepth 1 -type f -name 'Godot*' | head -n 1)"
          chmod +x "$GODOT_BIN"
          echo "GODOT_BIN=$GODOT_BIN" >> "$GITHUB_ENV"
          "$GODOT_BIN" --version

      - name: Import project with Godot
        shell: bash
        run: |
          set +e
          timeout 180 "$GODOT_BIN" --headless --editor --path project --quit-after 20 >godot-import.log 2>&1
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            echo "Godot import failed:"
            grep -Ei "error|failed|parser|invalid|cannot|could not" godot-import.log | tail -n 120 || tail -n 120 godot-import.log
            exit "$status"
          fi
          tail -n 20 godot-import.log

      - name: Export Web PWA
        shell: bash
        run: |
          set +e
          mkdir -p project/build/web
          "$GODOT_BIN" --headless --path project --export-release Web "$GITHUB_WORKSPACE/project/build/web/index.html" >godot-export.log 2>&1
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            echo "Godot Web export failed:"
            grep -Ei "error|failed|parser|invalid|cannot|could not|not found" godot-export.log | tail -n 160 || tail -n 160 godot-export.log
            exit "$status"
          fi
          tail -n 30 godot-export.log
          touch project/build/web/.nojekyll
          test -s project/build/web/index.html
          test -s project/build/web/index.wasm
          test -s project/build/web/index.pck
          test -s project/build/web/index.js

      - name: Configure GitHub Pages
        if: github.event_name == 'push'
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        if: github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: project/build/web

  deploy:
    if: github.event_name == 'push'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
