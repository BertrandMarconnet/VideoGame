name: One-time cleanup — keep main only

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/cleanup-non-main-branches-once.yml"

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Archive unique tips and delete every non-main branch
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          git fetch --prune origin '+refs/heads/*:refs/remotes/origin/*'
          mkdir -p build
          report="build/branch-cleanup.md"
          {
            echo '# Nettoyage des branches — 16 juillet 2026'
            echo
            echo 'Branche de production conservée : `main`.'
            echo
            echo '| Branche supprimée | SHA | Commits absents de main | Archive |'
            echo '|---|---:|---:|---|'
          } > "$report"

          mapfile -t branches < <(gh api --paginate "repos/${GITHUB_REPOSITORY}/branches?per_page=100" --jq '.[].name')
          for branch in "${branches[@]}"; do
            [[ "$branch" == "main" ]] && continue
            encoded="$(python3 -c 'import sys,urllib.parse; print(urllib.parse.quote(sys.argv[1], safe=""))' "$branch")"
            sha="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/heads/${encoded}" --jq '.object.sha')"
            ahead="$(git rev-list --count "origin/main..${sha}" 2>/dev/null || echo 0)"
            archive='—'
            if [[ "$ahead" -gt 0 ]]; then
              safe_name="$(printf '%s' "$branch" | tr '/ _' '---' | tr -cd '[:alnum:].-')"
              tag="archive/${safe_name}-20260716-${sha:0:8}"
              if gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/$(python3 -c 'import sys,urllib.parse; print(urllib.parse.quote(sys.argv[1], safe=""))' "$tag")" >/dev/null 2>&1; then
                archive="${tag} (existante)"
              else
                gh api -X POST "repos/${GITHUB_REPOSITORY}/git/refs" \
                  -f ref="refs/tags/${tag}" -f sha="$sha" >/dev/null
                archive="$tag"
              fi
            fi
            gh api -X DELETE "repos/${GITHUB_REPOSITORY}/git/refs/heads/${encoded}"
            printf '| `%s` | `%s` | %s | `%s` |\n' "$branch" "${sha:0:12}" "$ahead" "$archive" >> "$report"
          done

          {
            echo
            echo 'Les branches dont la pointe contenait des commits absents de `main` ont été conservées sous forme de tags d’archive avant suppression.'
            echo
            echo 'Ce workflow se supprime lui-même après exécution.'
          } >> "$report"

      - name: Commit cleanup report and remove this one-time workflow
        shell: bash
        run: |
          set -euo pipefail
          cp build/branch-cleanup.md docs/BRANCH_CLEANUP_2026-07-16.md
          rm .github/workflows/cleanup-non-main-branches-once.yml
          git config user.name "blackout-maintenance-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/BRANCH_CLEANUP_2026-07-16.md .github/workflows/cleanup-non-main-branches-once.yml
          git commit -m "Keep main as the only production branch"
          git pull --rebase origin main
          git push origin HEAD:main
