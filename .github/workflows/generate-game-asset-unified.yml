name: Generate game asset — unified
run-name: Asset ${{ inputs.job_id || github.event.issue.number || github.sha }}

on:
  push:
    branches: [main]
    paths:
      - "asset_jobs/**"
  issues:
    types: [opened, reopened]
  workflow_dispatch:
    inputs:
      request_file:
        description: Request JSON already present in the repository
        required: true
        type: string
        default: tests/fixtures/game_asset_fps_viewmodel.json
      job_id:
        description: Optional web job identifier
        required: false
        type: string
        default: ""
      commit_output:
        description: Commit the validated bundle to main
        required: true
        type: boolean
        default: true
  pull_request:
    paths:
      - ".github/ISSUE_TEMPLATE/generate-game-asset.yml"
      - ".github/ISSUE_TEMPLATE/config.yml"
      - ".github/workflows/generate-game-asset-unified.yml"
      - "web/asset-generator.html"
      - "web/asset-autodetect.js"
      - "web/github-direct-submit.js"
      - "scripts/generated_assets/**"
      - "tools/generate_game_asset*.py"
      - "tools/generate_specter5_production*.py"
      - "tools/parse_game_asset_issue*.py"
      - "tools/test_asset_issue_download.py"
      - "tools/publish_generated_asset.sh"
      - "tools/build_asset_audio*.py"
      - "tools/build_asset_sidecars.py"
      - "tools/sanitize_generated_glb.py"
      - "tools/validate_game_asset_bundle.py"
      - "tools/update_generated_asset_catalog.py"
      - "tools/patch_web_shell.py"
      - "tests/fixtures/game_asset_*.json"
      - "schemas/*.json"

permissions:
  contents: write
  issues: write

concurrency:
  group: game-asset-main
  cancel-in-progress: false

jobs:
  guide-unstructured-request:
    name: Explain why an image-only issue cannot generate an asset
    if: >-
      ${{
        github.event_name == 'issues' &&
        github.actor == github.repository_owner &&
        !startsWith(github.event.issue.title, '[ASSET]') &&
        (contains(github.event.issue.body, 'user-attachments/assets') || contains(github.event.issue.body, 'private-user-images.githubusercontent.com'))
      }}
    runs-on: ubuntu-latest
    steps:
      - name: Post the working interface link
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh issue comment "$ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY" --body "⚠️ Cette issue contient des images mais pas de demande structurée. Utilise l'interface directe : https://bertrandmarconnet.github.io/VideoGame/asset-generator.html. Elle analyse les images, prépare les options et lance automatiquement GitHub Actions."

  generate:
    name: Generate requested asset bundle
    if: >-
      ${{
        github.event_name != 'pull_request' &&
        github.actor == github.repository_owner &&
        (
          github.event_name == 'workflow_dispatch' ||
          (github.event_name == 'push' && startsWith(github.event.head_commit.message, 'Submit asset job ')) ||
          startsWith(github.event.issue.title, '[ASSET]') ||
          (contains(github.event.issue.body, '### Catégorie') && contains(github.event.issue.body, '### Images de référence'))
        )
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      REQUEST_JSON: build/game-asset/request.json
      IMAGE_DIR: build/game-asset/images
      BUNDLE_ROOT: assets/generated

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install Blender and validation tools
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            blender jq unzip curl python3-numpy ca-certificates \
            libegl1 libgl1 libglib2.0-0 libx11-6 libxext6 libxi6 libxrender1

      - name: Compile and test asset tools
        run: |
          set -euo pipefail
          python3 -m py_compile \
            tools/parse_game_asset_issue.py \
            tools/parse_game_asset_issue_v2.py \
            tools/test_asset_issue_download.py \
            tools/generate_game_asset.py \
            tools/generate_game_asset_v2.py \
            tools/generate_game_asset_v3.py \
            tools/generate_specter5_production.py \
            tools/generate_specter5_production_v2.py \
            tools/build_asset_audio.py \
            tools/build_asset_audio_v2.py \
            tools/build_asset_sidecars.py \
            tools/sanitize_generated_glb.py \
            tools/validate_game_asset_bundle.py \
            tools/update_generated_asset_catalog.py
          bash -n tools/publish_generated_asset.sh
          python3 tools/test_asset_issue_download.py

      - name: Prepare normalized request
        env:
          EVENT_PATH: ${{ github.event_path }}
          MANUAL_REQUEST: ${{ inputs.request_file }}
        run: |
          set -euo pipefail
          mkdir -p "$(dirname "$REQUEST_JSON")" "$IMAGE_DIR" build/game-asset/logs
          request_source=""

          if [[ "$GITHUB_EVENT_NAME" == "issues" ]]; then
            set +e
            python3 tools/parse_game_asset_issue_v2.py \
              --event "$EVENT_PATH" --output "$REQUEST_JSON" --image-dir "$IMAGE_DIR" \
              2>&1 | tee build/game-asset/logs/request.log
            parse_status=${PIPESTATUS[0]}
            set -e
            if [[ $parse_status -ne 0 ]]; then
              {
                echo "### Asset request parsing failed"
                echo '```text'
                tail -n 30 build/game-asset/logs/request.log
                echo '```'
              } >> "$GITHUB_STEP_SUMMARY"
              exit "$parse_status"
            fi
          elif [[ "$GITHUB_EVENT_NAME" == "push" ]]; then
            # Commits created through GitHub's low-level Git Database API may have empty
            # head_commit.added/modified arrays in the push event. Inspect the checked-out
            # commit itself instead; it is the source of truth for the submitted web job.
            mapfile -t request_candidates < <(
              git show --format= --name-only --diff-filter=AM "$GITHUB_SHA" |
                sed '/^$/d' |
                grep -E '^asset_jobs/[A-Za-z0-9._-]+/request\.json$' || true
            )
            if [[ ${#request_candidates[@]} -ne 1 ]]; then
              {
                echo "### Direct web job discovery failed"
                echo
                echo "Expected exactly one safe request.json in commit \`$GITHUB_SHA\`, found ${#request_candidates[@]}."
                echo '```text'
                git show --format= --name-status "$GITHUB_SHA"
                echo '```'
              } >> "$GITHUB_STEP_SUMMARY"
              echo "No unique safe asset_jobs request.json was added or modified by this commit."
              exit 1
            fi
            request_source="${request_candidates[0]}"
            [[ "$request_source" == asset_jobs/*/request.json ]]
            test -f "$request_source"
            test ! -L "$request_source"
            cp "$request_source" "$REQUEST_JSON"
          else
            request_source="$MANUAL_REQUEST"
            if [[ "$request_source" != tests/fixtures/*.json && "$request_source" != asset_jobs/*/request.json ]]; then
              echo "Unsafe manual request path: $request_source"
              exit 1
            fi
            test -f "$request_source"
            test ! -L "$request_source"
            cp "$request_source" "$REQUEST_JSON"
          fi

          jq -e '
            .schema_version == 1 and
            (.slug | test("^[a-z0-9_]{1,64}$")) and
            (.category | type == "string") and
            (.reference_images | type == "array" and length >= 1 and length <= 6)
          ' "$REQUEST_JSON"

          while IFS= read -r reference; do
            [[ "$reference" == asset_jobs/*/input/* || "$reference" == tests/fixtures/* ]] || {
              echo "Unsafe reference image path: $reference"
              exit 1
            }
            test -f "$reference"
            test ! -L "$reference"
          done < <(jq -r '.reference_images[]' "$REQUEST_JSON")

          while IFS= read -r audio; do
            [[ -z "$audio" || "$audio" == asset_jobs/*/audio/* || "$audio" == tests/fixtures/* ]] || {
              echo "Unsafe audio path: $audio"
              exit 1
            }
            [[ -z "$audio" ]] || test -f "$audio"
            [[ -z "$audio" ]] || test ! -L "$audio"
          done < <(jq -r '.audio_files[]? // empty' "$REQUEST_JSON")

          echo "SLUG=$(jq -r '.slug' "$REQUEST_JSON")" >> "$GITHUB_ENV"
          echo "GENERATOR_PROFILE=$(jq -r '.generator_profile' "$REQUEST_JSON")" >> "$GITHUB_ENV"
          echo "JOB_ID=$(jq -r '.job_id // ""' "$REQUEST_JSON")" >> "$GITHUB_ENV"
          echo "REQUEST_SOURCE_PATH=$request_source" >> "$GITHUB_ENV"
          {
            echo "### Request accepted"
            echo "- Source: \`$request_source\`"
            echo "- Slug: \`$(jq -r '.slug' "$REQUEST_JSON")\`"
            echo "- Category: \`$(jq -r '.category' "$REQUEST_JSON")\`"
            echo "- Images: $(jq '.reference_images | length' "$REQUEST_JSON")"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Generate controlled GLB bundle
        run: |
          set -euo pipefail
          BUNDLE_DIR="$BUNDLE_ROOT/$SLUG"
          rm -rf "$BUNDLE_DIR"
          mkdir -p "$BUNDLE_DIR" build/game-asset/logs
          if [[ "$GENERATOR_PROFILE" == "crawler7" ]]; then
            blender --background --factory-startup \
              --python tools/generate_crawler7_production_v5.py -- \
              --output "$BUNDLE_DIR/$SLUG.glb" \
              --metrics "$BUNDLE_DIR/$SLUG.metrics.json" \
              --preview "$BUNDLE_DIR/$SLUG.png" \
              --quality "$(jq -r '.quality' "$REQUEST_JSON" | sed 's/standard/high/;s/hero/high/')" \
              2>&1 | tee build/game-asset/logs/generation.log
            python3 tools/build_asset_sidecars.py \
              --request "$REQUEST_JSON" \
              --metrics "$BUNDLE_DIR/$SLUG.metrics.json" \
              --output-dir "$BUNDLE_DIR"
          elif [[ "$GENERATOR_PROFILE" == "specter_biped" ]]; then
            blender --background --factory-startup \
              --python tools/generate_specter5_production_v2.py -- \
              --request "$REQUEST_JSON" --output-dir "$BUNDLE_DIR" \
              2>&1 | tee build/game-asset/logs/generation.log
          else
            blender --background --factory-startup \
              --python tools/generate_game_asset_v3.py -- \
              --request "$REQUEST_JSON" --output-dir "$BUNDLE_DIR" \
              2>&1 | tee build/game-asset/logs/generation.log
          fi

      - name: Validate clean GLB, rig, animations, audio and damage zones
        run: |
          set -euo pipefail
          BUNDLE_DIR="$BUNDLE_ROOT/$SLUG"
          python3 tools/validate_game_asset_bundle.py \
            --bundle "$BUNDLE_DIR" --slug "$SLUG" \
            --report "$BUNDLE_DIR/$SLUG.validation.json" \
            2>&1 | tee build/game-asset/logs/validation.log
          python3 tools/update_generated_asset_catalog.py \
            --catalog "$BUNDLE_ROOT/catalog.json" \
            --asset "$BUNDLE_DIR/$SLUG.asset.json"

      - name: Validate Godot 4.7 import, bridge and synchronized audio runtime
        run: |
          set -euo pipefail
          mkdir -p scripts .godot-bin build/game-asset/logs
          cat src_parts/main_*.gdpart > scripts/main.gd
          tag="4.7-stable"
          curl -fsSL --retry 5 --retry-delay 3 -o godot.zip \
            "https://github.com/godotengine/godot/releases/download/${tag}/Godot_v${tag}_linux.x86_64.zip"
          unzip -q godot.zip -d .godot-bin
          GODOT_BIN="$(find .godot-bin -maxdepth 1 -type f -name 'Godot*' | head -n 1)"
          chmod +x "$GODOT_BIN"
          timeout 180 "$GODOT_BIN" --headless --editor --path . --quit-after 12 \
            > build/game-asset/logs/godot-import.log 2>&1
          if grep -Eqi 'SCRIPT ERROR|Invalid call|Invalid get index|Attempt to call|Parse Error|ERROR:' build/game-asset/logs/godot-import.log; then
            cat build/game-asset/logs/godot-import.log
            exit 1
          fi

      - name: Publish validated bundle to main
        if: ${{ success() && (github.event_name == 'issues' || github.event_name == 'push' || inputs.commit_output == true) }}
        run: |
          set -euo pipefail
          job_dir=""
          if [[ "$REQUEST_SOURCE_PATH" == asset_jobs/*/request.json ]]; then
            job_dir="$(dirname "$REQUEST_SOURCE_PATH")"
          fi
          bash tools/publish_generated_asset.sh \
            "$BUNDLE_ROOT" "$SLUG" build/game-asset/logs/publish.log "$job_dir"

      - name: Report successful issue generation
        if: ${{ success() && github.event_name == 'issues' }}
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh issue comment "$ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY" --body "✅ Asset **$SLUG** généré, nettoyé et validé : [GLB](https://github.com/${GITHUB_REPOSITORY}/blob/main/assets/generated/${SLUG}/${SLUG}.glb) · [aperçu](https://github.com/${GITHUB_REPOSITORY}/blob/main/assets/generated/${SLUG}/${SLUG}.png) · [manifeste](https://github.com/${GITHUB_REPOSITORY}/blob/main/assets/generated/${SLUG}/${SLUG}.asset.json) · [dégâts](https://github.com/${GITHUB_REPOSITORY}/blob/main/assets/generated/${SLUG}/${SLUG}.damage.json) · [sons synchronisés](https://github.com/${GITHUB_REPOSITORY}/blob/main/assets/generated/${SLUG}/${SLUG}.audio.json) · [validation](https://github.com/${GITHUB_REPOSITORY}/blob/main/assets/generated/${SLUG}/${SLUG}.validation.json)"
          gh issue close "$ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY" --reason completed

      - name: Report failed issue generation
        if: ${{ failure() && github.event_name == 'issues' }}
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail
          comment_file="build/game-asset/failure-comment.md"
          mkdir -p "$(dirname "$comment_file")"
          label="Erreur non classée"
          log_file=""
          for candidate in \
            build/game-asset/logs/publish.log \
            build/game-asset/logs/godot-import.log \
            build/game-asset/logs/validation.log \
            build/game-asset/logs/generation.log \
            build/game-asset/logs/request.log; do
            if [[ -s "$candidate" ]]; then
              log_file="$candidate"
              case "$candidate" in
                *publish.log) label="Erreur de publication Git" ;;
                *godot-import.log) label="Erreur d'import Godot" ;;
                *validation.log) label="Erreur de validation du bundle" ;;
                *generation.log) label="Erreur de génération Blender" ;;
                *request.log) label="Erreur de préparation de la demande" ;;
              esac
              break
            fi
          done
          {
            echo "❌ Aucun asset n'a été ajouté."
            echo
            echo "**$label :**"
            if [[ -n "$log_file" ]]; then
              echo '```text'
              tail -n 24 "$log_file"
              echo '```'
            else
              echo "Aucun journal ciblé n'a été produit."
            fi
            echo "Diagnostic complet : ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          } > "$comment_file"
          gh issue comment "$ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY" --body-file "$comment_file"

      - name: Upload bundle and diagnostics
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: game-asset-${{ env.SLUG || env.JOB_ID || github.run_id }}
          path: |
            assets/generated/${{ env.SLUG }}
            assets/generated/catalog.json
            build/game-asset
          if-no-files-found: warn
          retention-days: 30

  pull-request-smoke:
    name: Smoke ${{ matrix.fixture }}
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        fixture:
          - game_asset_specter.json
          - game_asset_character.json
          - game_asset_fps_viewmodel.json
          - game_asset_machine.json
          - game_asset_wall.json
          - game_asset_prop.json
          - game_asset_door.json
          - game_asset_environment.json
          - game_asset_gui.json
    steps:
      - uses: actions/checkout@v5
      - name: Install Blender
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends blender python3-numpy libegl1 libgl1 libglib2.0-0
      - name: Compile tools and test issue attachments
        run: |
          python3 -m py_compile \
            tools/parse_game_asset_issue.py tools/parse_game_asset_issue_v2.py tools/test_asset_issue_download.py \
            tools/generate_game_asset.py tools/generate_game_asset_v2.py tools/generate_game_asset_v3.py \
            tools/generate_specter5_production.py tools/generate_specter5_production_v2.py \
            tools/build_asset_audio.py tools/build_asset_audio_v2.py tools/build_asset_sidecars.py \
            tools/sanitize_generated_glb.py tools/validate_game_asset_bundle.py
          bash -n tools/publish_generated_asset.sh
          python3 tools/test_asset_issue_download.py
      - name: Generate and validate fixture
        run: |
          set -o pipefail
          REQUEST="tests/fixtures/${{ matrix.fixture }}"
          SLUG="$(python3 -c 'import json,sys; print(json.load(open(sys.argv[1]))["slug"])' "$REQUEST")"
          PROFILE="$(python3 -c 'import json,sys; print(json.load(open(sys.argv[1]))["generator_profile"])' "$REQUEST")"
          OUT="build/smoke/$SLUG"
          mkdir -p "$OUT"
          GENERATOR="tools/generate_game_asset_v3.py"
          if [[ "$PROFILE" == "specter_biped" ]]; then
            GENERATOR="tools/generate_specter5_production_v2.py"
          fi
          set +e
          blender --background --factory-startup --python "$GENERATOR" -- \
            --request "$REQUEST" --output-dir "$OUT" 2>&1 | tee "$OUT/generation.log"
          status=${PIPESTATUS[0]}
          set -e
          if [[ $status -ne 0 ]]; then
            tail -n 200 "$OUT/generation.log"
            exit $status
          fi
          python3 tools/validate_game_asset_bundle.py \
            --bundle "$OUT" --slug "$SLUG" --report "$OUT/$SLUG.validation.json" \
            2>&1 | tee "$OUT/validation.log"
      - name: Upload preview and diagnostics
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: smoke-${{ matrix.fixture }}-${{ github.run_id }}
          path: build/smoke
          if-no-files-found: warn
          retention-days: 14
