name: Générer CRAWLER-7 production
description: Génère le robot segmenté avec rig, matériaux, collisions et animations, sans image ni clé API.
title: "[ROBOT] CRAWLER-7"
labels: []
body:
  - type: markdown
    attributes:
      value: |
        Cette interface ne reconstruit plus une forme approximative depuis une image.
        Elle fabrique un asset mécanique déterministe adapté au storyboard et à Godot :
        membres séparés, rig quadrupède, matériaux industriels et cinq animations.

  - type: dropdown
    id: quality
    attributes:
      label: Qualité
      description: Web est recommandé pour le jeu. High utilise une texture plus grande.
      options:
        - Web / PS1 — recommandé
        - High — contrôle artistique
      default: 0
    validations:
      required: true

  - type: checkboxes
    id: confirmation
    attributes:
      label: Lancer la génération
      options:
        - label: Je confirme la génération de CRAWLER-7 et l'ajout du GLB validé dans le dépôt.
          required: true
