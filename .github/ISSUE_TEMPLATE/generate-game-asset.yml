name: Générer un asset de jeu
about: Génère un GLB, ses textures, son rig, ses animations, ses zones de dégâts et son intégration Godot.
title: "[ASSET] "
labels: []
body:
  - type: markdown
    attributes:
      value: |
        Cette interface fabrique un asset low-poly **contrôlé et compatible Godot 4.7/Jolt/Web**.
        Ajoutez de 1 à 6 images : elles guident la palette, les textures, les proportions et la famille visuelle.
        Le système choisit ensuite un générateur adapté à la catégorie afin de produire une géométrie segmentée, un rig et des animations lorsque cela est pertinent.
        Il ne prétend pas reconstruire automatiquement chaque détail caché d'une photographie : le résultat reste une interprétation PS1 cohérente avec le storyboard.

  - type: input
    id: asset_name
    attributes:
      label: Nom de l'asset
      description: Exemple : SPECTER-5, lampe FPS, mur placo atelier, console Sentinel.
      placeholder: Lampe FPS + main droite
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Catégorie
      options:
        - Robot bipède
        - Robot quadrupède
        - Personnage humanoïde
        - Vue FPS : main + objet
        - Machine / bras industriel articulé
        - Prop / objet interactif
        - Mur / cloison modulaire
        - Porte / sas
        - Module d'environnement
        - Console / écran / GUI 3D
    validations:
      required: true

  - type: textarea
    id: reference_images
    attributes:
      label: Images de référence
      description: Glissez ici 1 à 6 images. Pour un robot ou personnage, utilisez si possible face, droite, arrière et trois-quarts.
      placeholder: Glisser-déposer les images ici
    validations:
      required: false

  - type: dropdown
    id: reference_mode
    attributes:
      label: Type de références fournies
      options:
        - Une vue principale / trois-quarts
        - Quatre vues orthographiques cohérentes
        - Plusieurs vues libres du même asset
        - Storyboard / concept art d'ambiance
        - Aucune image, génération depuis le profil
    validations:
      required: true

  - type: dropdown
    id: visual_profile
    attributes:
      label: Profil visuel
      options:
        - PS1 industriel ToyGuard
        - Métal militaire rétro-futuriste
        - Bunker S-01 béton et acier
        - Interface CRT / Sentinel OS
        - Prop industriel générique
        - Personnage technicien années 1980
    validations:
      required: true

  - type: dropdown
    id: geometry_template
    attributes:
      label: Structure géométrique
      options:
        - Automatique selon la catégorie
        - Monobloc simple
        - Pièces modulaires détachables
        - Outil tenu en main
        - Console / panneau technique
        - Mur cellulaire
        - Porte articulée
        - Module environnemental
        - Bipède articulé
        - Quadrupède articulé
        - Machine articulée
    validations:
      required: true

  - type: textarea
    id: segmentation_parts
    attributes:
      label: Parties à séparer / segmenter
      description: Liste séparée par des virgules. Exemple : tête, poignée, batterie, lentille. Pour un robot : jambe gauche, jambe droite, bras, capteur, torse.
      placeholder: tête, poignée, batterie, lentille
    validations:
      required: false

  - type: input
    id: width
    attributes:
      label: Largeur cible en mètres
      value: "1.0"
    validations:
      required: true

  - type: input
    id: height
    attributes:
      label: Hauteur cible en mètres
      value: "1.0"
    validations:
      required: true

  - type: input
    id: depth
    attributes:
      label: Profondeur cible en mètres
      value: "1.0"
    validations:
      required: true

  - type: dropdown
    id: material
    attributes:
      label: Matériau principal
      options:
        - Métal léger
        - Métal blindé
        - Plastique technique
        - Caoutchouc / tissu technique
        - Verre
        - Placo
        - Brique
        - Béton
        - Bois
    validations:
      required: true

  - type: dropdown
    id: texture_mode
    attributes:
      label: Texture
      options:
        - Atlas PS1 généré depuis les images
        - Palette PS1 sans texture détaillée
        - Première image utilisée comme écran / GUI
        - Matériau plat seulement
    validations:
      required: true

  - type: dropdown
    id: rig
    attributes:
      label: Rig / articulation
      options:
        - Aucun
        - Mécanique bipède
        - Mécanique quadrupède
        - Humanoïde
        - Main FPS articulée
        - Machine articulée
        - Charnière simple
        - Pièces rigides segmentées
    validations:
      required: true

  - type: textarea
    id: animations
    attributes:
      label: Animations souhaitées
      description: Liste séparée par des virgules. Exemples : idle, walk, run, attack, crawl, shutdown, open, close, use, bash, inspect.
      value: idle
    validations:
      required: true

  - type: dropdown
    id: collision
    attributes:
      label: Collision Godot
      options:
        - Automatique selon la catégorie
        - Boîte simple
        - Capsule personnage / robot
        - Boîtes locales par partie
        - Mur segmenté par cellule
        - Aucune collision
    validations:
      required: true

  - type: dropdown
    id: destruction
    attributes:
      label: Destructibilité
      options:
        - Aucune
        - Dégâts localisés
        - Membres / pièces détachables
        - Mur segmenté avec trous locaux
        - Avancée selon le matériau
    validations:
      required: true

  - type: textarea
    id: damage_zones
    attributes:
      label: Zones critiques et conséquences
      description: Exemple : jambe gauche = vitesse -35%; deux jambes = ramper; capteur = vision réduite; lentille = lumière désactivée.
      placeholder: left_leg: detach, speed 0.65; right_leg: detach; sensor: disable_detection
    validations:
      required: false

  - type: textarea
    id: interactions
    attributes:
      label: Outils et interactions
      description: Exemple : lampe faible, planche moyenne, pied-de-biche fort sur placo, SPECTER très fort sur brique.
      placeholder: flashlight_bash=0.4; plank=0.8; crowbar=2.0; specter_charge=4.0
    validations:
      required: false

  - type: dropdown
    id: quality
    attributes:
      label: Qualité
      options:
        - Web / mobile PS1 — recommandé
        - Standard
        - Hero asset
    validations:
      required: true

  - type: dropdown
    id: integration
    attributes:
      label: Intégration dans le jeu
      options:
        - Ajouter au catalogue seulement
        - Remplacer automatiquement le modèle procédural correspondant
        - Générer un module instanciable depuis l'AssetBridge
        - Générer une vue FPS instanciable depuis l'AssetBridge
    validations:
      required: true

  - type: checkboxes
    id: confirmation
    attributes:
      label: Confirmation
      options:
        - label: Je confirme les droits d'utilisation des images et la génération de l'asset dans le dépôt.
          required: true
