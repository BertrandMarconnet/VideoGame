name: "🎛️ Générer un asset 3D complet"
description: "Formulaire guidé avec menus, cases à cocher, images, animations, dégâts, sons et intégration Godot."
title: "[ASSET] "
labels: []
body:
  - type: markdown
    attributes:
      value: |
        # BLACKOUT PROTOCOL — GÉNÉRATEUR D'ASSET 3D

        Remplissez les menus et les cases ci-dessous. Après création de l'issue, GitHub Actions génère automatiquement le bundle : **GLB + rig + animations + textures + sons + dégâts localisés + intégration Godot**.

        Pour sélectionner visuellement les animations et les zones destructibles, utilisez d'abord le [configurateur visuel](https://bertrandmarconnet.github.io/VideoGame/asset-generator.html). Les images et sons devront ensuite être glissés dans les zones prévues ci-dessous.

  - type: input
    id: asset_name
    attributes:
      label: "Nom de l'asset"
      description: "Nom unique du modèle à générer."
      placeholder: "SPECTER-05, CRAWLER-07, lampe FPS, porte S-01"
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: "Catégorie"
      description: "Sélectionner la famille technique de l'asset."
      options:
        - "Robot bipède"
        - "Robot quadrupède"
        - "Personnage humanoïde"
        - "Vue FPS : main + objet"
        - "Machine / bras industriel articulé"
        - "Prop / objet interactif"
        - "Mur / cloison modulaire"
        - "Porte / sas"
        - "Module d'environnement"
        - "Console / écran / GUI 3D"
      default: 0
    validations:
      required: true

  - type: textarea
    id: role
    attributes:
      label: "Rôle du modèle dans le jeu"
      description: "Décrire son usage, son comportement, ses interactions et les conséquences attendues lorsqu'il est endommagé."
      placeholder: "Robot de poursuite qui continue à ramper après la perte des deux jambes."
    validations:
      required: true

  - type: textarea
    id: reference_images
    attributes:
      label: "Images de référence"
      description: "Glisser-déposer ici 1 à 6 images PNG, JPG, JPEG ou WebP du même modèle. Pour un robot : face, profil droit, arrière et trois-quarts. Ne pas utiliser le bouton général de pièce jointe en dehors de ce champ."
      placeholder: "Glissez les images dans cette zone. Les liens GitHub apparaîtront automatiquement."
    validations:
      required: true

  - type: dropdown
    id: reference_mode
    attributes:
      label: "Organisation des images"
      description: "Indiquer comment les vues ont été préparées."
      options:
        - "Quatre vues orthographiques cohérentes"
        - "Plusieurs vues libres du même asset"
        - "Une vue principale / trois-quarts"
        - "Storyboard / concept art d'ambiance"
      default: 0
    validations:
      required: true

  - type: input
    id: dimensions
    attributes:
      label: "Dimensions cibles L × H × P en mètres"
      description: "Utiliser des dimensions réelles pour éviter un modèle disproportionné."
      placeholder: "0.80 x 2.10 x 0.55"
      value: "1.00 x 1.00 x 1.00"
    validations:
      required: true

  - type: dropdown
    id: material
    attributes:
      label: "Matériau principal"
      options:
        - "Métal léger"
        - "Métal blindé"
        - "Plastique technique"
        - "Caoutchouc / tissu technique"
        - "Verre"
        - "Placo"
        - "Brique"
        - "Béton"
        - "Bois"
      default: 0
    validations:
      required: true

  - type: dropdown
    id: build_profile
    attributes:
      label: "Profil de génération"
      description: "Le mode automatique choisit le générateur adapté à la catégorie."
      options:
        - "Automatique selon la catégorie — recommandé"
        - "Robot ou personnage articulé"
        - "Vue FPS main et objet articulés"
        - "Machine articulée"
        - "Prop modulaire segmenté"
        - "Mur destructible cellulaire"
        - "Porte ou sas articulé"
        - "Environnement modulaire"
        - "Console ou GUI 3D"
      default: 0
    validations:
      required: true

  - type: checkboxes
    id: standard_animations
    attributes:
      label: "Animations standard"
      description: "Cocher uniquement les clips utiles. Plusieurs choix sont possibles."
      options:
        - label: "idle — attente et micro-mouvements en boucle"
        - label: "walk — marche en boucle"
        - label: "run — course ou déplacement rapide"
        - label: "attack — attaque ou frappe principale"
        - label: "crawl — progression au sol ou après démembrement"
        - label: "shutdown — arrêt, chute ou mise hors service"
        - label: "interact — interaction avec un terminal ou un objet"
        - label: "use — utilisation d'un outil ou d'une vue FPS"
        - label: "bash — coup porté avec l'objet FPS"
        - label: "inspect — inspection de l'objet tenu"
        - label: "work — cycle de travail d'une machine"
        - label: "alarm — réaction d'alarme"
        - label: "open — ouverture"
        - label: "close — fermeture"
        - label: "lock — verrouillage"
        - label: "unlock — déverrouillage"
        - label: "boot — démarrage d'une console"
        - label: "break — rupture ou destruction"
        - label: "fall — chute"

  - type: input
    id: custom_animations
    attributes:
      label: "Animations supplémentaires"
      description: "Séparer les noms par des virgules."
      placeholder: "scan, stagger, turn_left, recharge"

  - type: checkboxes
    id: destructible_parts
    attributes:
      label: "Parties séparables / destructibles"
      description: "Cocher les éléments devant être indépendants, détachables ou dotés d'une conséquence fonctionnelle."
      options:
        - label: "tête"
        - label: "capteur"
        - label: "torse ou corps central"
        - label: "bras gauche"
        - label: "bras droit"
        - label: "jambe gauche"
        - label: "jambe droite"
        - label: "patte avant gauche"
        - label: "patte avant droite"
        - label: "patte arrière gauche"
        - label: "patte arrière droite"
        - label: "main ou poignée"
        - label: "batterie"
        - label: "lentille ou écran"
        - label: "panneau ou porte"
        - label: "charnière ou verrou"
        - label: "cellule de mur"
        - label: "outil terminal"

  - type: input
    id: custom_parts
    attributes:
      label: "Parties supplémentaires"
      placeholder: "épaule gauche, câble dorsal, cellule 04, clavier, roue"

  - type: textarea
    id: damage_zones
    attributes:
      label: "Zones critiques et conséquences"
      description: "Indiquer une règle par zone ou par combinaison de zones."
      placeholder: "jambe gauche = détachement et vitesse ×0.65 ; deux jambes = crawl ; capteur = détection réduite ; torse = arrêt"
    validations:
      required: true

  - type: textarea
    id: interactions
    attributes:
      label: "Outils et interactions"
      description: "Multiplicateurs appliqués selon l'outil et le matériau."
      value: "flashlight_bash=0.4; plank=0.8; crowbar=2.0; thrown_prop=1.0; specter_charge=4.0"
    validations:
      required: true

  - type: dropdown
    id: sound_mode
    attributes:
      label: "Mode sonore"
      options:
        - "Sons procéduraux adaptés à la catégorie — recommandé"
        - "Utiliser uniquement mes sons"
        - "Mélanger mes sons et les sons procéduraux"
        - "Aucun son"
      default: 0
    validations:
      required: true

  - type: checkboxes
    id: sound_presets
    attributes:
      label: "Familles sonores"
      description: "Sélectionner les familles à synchroniser avec les animations."
      options:
        - label: "servo"
        - label: "step"
        - label: "hydraulic"
        - label: "impact"
        - label: "alarm"
        - label: "electric"
        - label: "ambience"

  - type: textarea
    id: model_sounds
    attributes:
      label: "Sons du modèle"
      description: "Facultatif. Glisser ici jusqu'à 8 fichiers WAV, OGG ou MP3. Laisser vide en mode sons procéduraux."
      placeholder: "Glissez les fichiers audio dans cette zone si nécessaire."

  - type: textarea
    id: sound_sync
    attributes:
      label: "Synchronisation animation ↔ son"
      description: "Format : animation = clip @ temps_normalisé. Ajouter @ loop pour une boucle."
      value: |
        walk = step @ 0.18
        walk = step @ 0.68
        run = step @ 0.12
        run = step @ 0.55
        attack = impact @ 0.46
        idle = servo @ 0.00 @ loop
        shutdown = electric @ 0.35

  - type: dropdown
    id: delivery
    attributes:
      label: "Qualité et intégration"
      options:
        - "Web / mobile PS1 + intégrer au jeu — recommandé"
        - "Web / mobile PS1 + catalogue seulement"
        - "Standard + intégrer au jeu"
        - "Hero asset + catalogue seulement"
        - "Vue FPS Web + intégrer sous la caméra"
      default: 0
    validations:
      required: true

  - type: checkboxes
    id: confirmation
    attributes:
      label: "Vérifications obligatoires"
      options:
        - label: "Toutes les images représentent exactement la même variante du modèle."
          required: true
        - label: "Le modèle est entièrement visible et ses dimensions sont réalistes."
          required: true
        - label: "Les parties mobiles, séparables ou destructibles sont identifiées."
          required: true
        - label: "Je confirme les droits d'utilisation des images et des sons."
          required: true
