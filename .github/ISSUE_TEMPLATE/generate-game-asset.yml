name: "🎛️ Générer un asset 3D complet"
description: "Formulaire guidé avec catégories, animations, zones destructibles, sons et intégration Godot."
title: "[ASSET] "
labels: []
assignees:
  - BertrandMarconnet
body:
  - type: markdown
    attributes:
      value: |
        # BLACKOUT PROTOCOL — GÉNÉRATEUR D'ASSET 3D

        Ce formulaire GitHub permet de choisir les paramètres du modèle avec des **menus déroulants et des cases à cocher**.

        Pour utiliser le menu graphique avec mannequins animés et sélection visuelle des parties, ouvrir le [configurateur visuel](https://bertrandmarconnet.github.io/VideoGame/asset-generator.html).

  - type: input
    id: asset_name
    attributes:
      label: Nom de l'asset
      description: Nom unique du modèle à générer.
      placeholder: SPECTER-05, CRAWLER-07, lampe FPS, porte S-01
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Catégorie
      description: Sélectionner le type d'asset à produire.
      options:
        - Robot bipède
        - Robot quadrupède
        - Personnage humanoïde
        - Vue FPS : main + objet
        - Machine / bras industriel articulé
        - Prop / objet interactif
        - Mur / cloison modulaire
        - Porte / sas
        - Module d'environnement
        - Console / écran / GUI 3D
      default: 0
    validations:
      required: true

  - type: textarea
    id: role
    attributes:
      label: Rôle du modèle dans le jeu
      description: Décrire son comportement, ses interactions et son usage dans le niveau.
      placeholder: Robot de poursuite qui continue à ramper après la perte des jambes.
    validations:
      required: true

  - type: upload
    id: reference_images
    attributes:
      label: Images de référence
      description: Ajouter 1 à 6 images cohérentes du même modèle : face, profil, arrière et trois-quarts recommandés.
    validations:
      required: true

  - type: dropdown
    id: reference_mode
    attributes:
      label: Organisation des images
      options:
        - Quatre vues orthographiques cohérentes
        - Plusieurs vues libres du même asset
        - Une vue principale / trois-quarts
        - Storyboard / concept art d'ambiance
      default: 0
    validations:
      required: true

  - type: input
    id: dimensions
    attributes:
      label: Dimensions cibles L × H × P en mètres
      placeholder: 0.80 x 2.10 x 0.55
      value: "1.00 x 1.00 x 1.00"
    validations:
      required: true

  - type: dropdown
    id: material
    attributes:
      label: Matériau principal
      options:
        - Métal léger
        - Métal blindé
        - Plastique technique
        - Caoutchouc / tissu technique
        - Verre
        - Placo
        - Brique
        - Béton
        - Bois
      default: 0
    validations:
      required: true

  - type: dropdown
    id: build_profile
    attributes:
      label: Profil de génération
      options:
        - Automatique selon la catégorie — recommandé
        - Robot ou personnage articulé
        - Vue FPS main et objet articulés
        - Machine articulée
        - Prop modulaire segmenté
        - Mur destructible cellulaire
        - Porte ou sas articulé
        - Environnement modulaire
        - Console ou GUI 3D
      default: 0
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ## Animations
        Cocher uniquement les mouvements réellement nécessaires pour limiter la taille du GLB et les coûts d'exécution Web/mobile.

  - type: checkboxes
    id: standard_animations
    attributes:
      label: Animations à générer
      options:
        - label: idle — attente et micro-mouvements en boucle
        - label: walk — marche en boucle
        - label: run — course ou déplacement rapide
        - label: attack — attaque ou frappe principale
        - label: crawl — progression au sol ou après démembrement
        - label: shutdown — arrêt, chute ou mise hors service
        - label: interact — interaction avec un terminal ou un objet
        - label: use — utilisation d'un outil ou d'une vue FPS
        - label: bash — coup porté avec l'objet FPS
        - label: inspect — inspection de l'objet tenu
        - label: work — cycle de travail d'une machine
        - label: alarm — réaction d'alarme
        - label: open — ouverture
        - label: close — fermeture
        - label: lock — verrouillage
        - label: unlock — déverrouillage
        - label: boot — démarrage d'une console
        - label: break — rupture ou destruction
        - label: fall — chute

  - type: input
    id: custom_animations
    attributes:
      label: Animations supplémentaires
      description: Séparer les noms par des virgules.
      placeholder: scan, stagger, turn_left, recharge

  - type: markdown
    attributes:
      value: |
        ## Parties séparables et dégâts
        Cocher les éléments qui doivent être indépendants, détachables ou dotés d'une conséquence fonctionnelle.

  - type: checkboxes
    id: destructible_parts
    attributes:
      label: Parties séparables / destructibles
      options:
        - label: tête
        - label: capteur
        - label: torse / corps central
        - label: bras gauche
        - label: bras droit
        - label: jambe gauche
        - label: jambe droite
        - label: patte avant gauche
        - label: patte avant droite
        - label: patte arrière gauche
        - label: patte arrière droite
        - label: main / poignée
        - label: batterie
        - label: lentille / écran
        - label: panneau / porte
        - label: charnière / verrou
        - label: cellule de mur
        - label: outil terminal

  - type: input
    id: custom_parts
    attributes:
      label: Parties supplémentaires
      placeholder: épaule gauche, câble dorsal, cellule 04, clavier, roue

  - type: textarea
    id: damage_zones
    attributes:
      label: Zones critiques et conséquences
      description: Indiquer une règle par zone.
      placeholder: jambe gauche = détachement et vitesse ×0.65 ; deux jambes = crawl ; capteur = détection réduite ; torse = arrêt
    validations:
      required: true

  - type: textarea
    id: interactions
    attributes:
      label: Outils et interactions
      value: "flashlight_bash=0.4; plank=0.8; crowbar=2.0; thrown_prop=1.0; specter_charge=4.0"
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ## Sons synchronisés
        Le bundle peut contenir des sons procéduraux ou des fichiers personnels, associés à des marqueurs d'animation.

  - type: dropdown
    id: sound_mode
    attributes:
      label: Mode sonore
      options:
        - Sons procéduraux adaptés à la catégorie — recommandé
        - Utiliser uniquement mes sons
        - Mélanger mes sons et les sons procéduraux
        - Aucun son
      default: 0
    validations:
      required: true

  - type: checkboxes
    id: sound_presets
    attributes:
      label: Familles sonores
      options:
        - label: servo
        - label: step
        - label: hydraulic
        - label: impact
        - label: alarm
        - label: electric
        - label: ambience

  - type: upload
    id: model_sounds
    attributes:
      label: Sons personnels du modèle
      description: Facultatif — fichiers WAV, OGG ou MP3.
    validations:
      required: false

  - type: textarea
    id: sound_sync
    attributes:
      label: Synchronisation animation ↔ son
      description: Format « animation = clip @ temps_normalisé ». Ajouter « @ loop » pour une boucle.
      value: |
        walk = step @ 0.18
        walk = step @ 0.68
        run = step @ 0.12
        run = step @ 0.55
        attack = impact @ 0.46
        idle = servo @ 0.00 @ loop
        shutdown = electric @ 0.35

  - type: dropdown
    id: delivery
    attributes:
      label: Qualité et intégration
      options:
        - Web / mobile PS1 + intégrer au jeu — recommandé
        - Web / mobile PS1 + catalogue seulement
        - Standard + intégrer au jeu
        - Hero asset + catalogue seulement
        - Vue FPS Web + intégrer sous la caméra
      default: 0
    validations:
      required: true

  - type: checkboxes
    id: confirmation
    attributes:
      label: Vérifications obligatoires
      options:
        - label: Toutes les images représentent exactement la même variante du modèle.
          required: true
        - label: Le modèle est entièrement visible et ses dimensions sont réalistes.
          required: true
        - label: Les parties mobiles, séparables ou destructibles sont identifiées.
          required: true
        - label: Je confirme les droits d'utilisation des images et des sons.
          required: true
