name: Générer un asset de jeu
description: Menu guidé pour générer un GLB low-poly, ses textures, son rig, ses animations, ses parties destructibles et son intégration Godot.
title: "[ASSET] "
labels: []
assignees:
  - BertrandMarconnet
body:
  - type: markdown
    attributes:
      value: |
        # Blackout Protocol — Générateur d'asset 3D

        Remplissez les menus ci-dessous puis chargez **1 à 6 images du même modèle**. Après validation, GitHub Actions génère et contrôle le bundle avant de l'ajouter au jeu.

        **Vues recommandées :**
        - robot/personnage : face, droite, arrière, trois-quarts, corps entier, pose neutre ;
        - quadrupède : face, profil, arrière, trois-quarts surélevé, quatre pattes visibles ;
        - main FPS + objet : vue joueur, profil, dessus, dessous/poignée, objet seul ;
        - prop : trois-quarts, profil, arrière, dessus si asymétrique ;
        - mur/porte/environnement : face orthographique, profil/épaisseur, arrière, trois-quarts et dimensions ;
        - console/GUI : face, profil, trois-quarts et image d'écran séparée.

        Toutes les images doivent montrer la **même variante**, sans partie coupée, sur fond simple et sans grand-angle.

  - type: input
    id: asset_name
    attributes:
      label: Nom de l'asset
      description: Nom court et unique.
      placeholder: SPECTER-5, lampe FPS, sas S-01, cloison atelier
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Catégorie
      description: Détermine la famille de géométrie, le rig et les contrôles attendus.
      options:
        - Robot bipède
        - Robot quadrupède
        - Personnage humanoïde
        - Vue FPS : main + objet
        - Machine / bras industriel articulé
        - Prop / objet interactif
        - Mur / cloison modulaire
        - Porte / sas
        - Module d'environnement
        - Console / écran / GUI 3D
      default: 0
    validations:
      required: true

  - type: upload
    id: reference_images
    attributes:
      label: Images de référence
      description: Glissez 1 à 6 fichiers PNG, JPG, JPEG ou WebP. Pour un robot, quatre vues cohérentes sont fortement recommandées.
    validations:
      required: true
      accept: ".png,.jpg,.jpeg,.webp"

  - type: dropdown
    id: reference_mode
    attributes:
      label: Organisation des images
      options:
        - Quatre vues orthographiques cohérentes
        - Plusieurs vues libres du même asset
        - Une vue principale / trois-quarts
        - Storyboard / concept art d'ambiance
      default: 0
    validations:
      required: true

  - type: input
    id: dimensions
    attributes:
      label: Dimensions cibles L × H × P en mètres
      description: Largeur, hauteur et profondeur maximales réelles, séparées par x.
      placeholder: 0.80 x 2.45 x 0.55
      value: "1.00 x 1.00 x 1.00"
    validations:
      required: true

  - type: dropdown
    id: material
    attributes:
      label: Matériau principal
      description: Pilote la résistance, les dégâts et le type de rupture.
      options:
        - Métal léger
        - Métal blindé
        - Plastique technique
        - Caoutchouc / tissu technique
        - Verre
        - Placo
        - Brique
        - Béton
        - Bois
      default: 0
    validations:
      required: true

  - type: dropdown
    id: build_profile
    attributes:
      label: Profil de génération
      description: Le mode automatique applique le profil recommandé pour la catégorie.
      options:
        - Automatique selon la catégorie — recommandé
        - Robot ou personnage articulé
        - Vue FPS main et objet articulés
        - Machine articulée
        - Prop modulaire segmenté
        - Mur destructible cellulaire
        - Porte ou sas articulé
        - Environnement modulaire
        - Console ou GUI 3D
      default: 0
    validations:
      required: true

  - type: textarea
    id: asset_spec
    attributes:
      label: Spécification gameplay, parties, animations et dégâts
      description: Conservez les clés ci-dessous. Complétez surtout ROLE, SEGMENTATION, ANIMATIONS et DAMAGE_ZONES.
      value: |
        ROLE: Décrire où et comment le modèle est utilisé dans le jeu.
        VISUAL_PROFILE: PS1 industriel ToyGuard
        GEOMETRY_TEMPLATE: Automatique selon la catégorie
        TEXTURE_MODE: Atlas PS1 généré depuis les images
        RIG: Automatique selon la catégorie
        ANIMATIONS: idle
        COLLISION: Automatique selon la catégorie
        DESTRUCTION: Dégâts localisés
        SEGMENTATION: corps, partie mobile 1, partie mobile 2, capteur
        DAMAGE_ZONES: partie mobile = détachement ou perte de fonction
        INTERACTIONS: flashlight_bash=0.4; plank=0.8; crowbar=2.0; thrown_prop=1.0; specter_charge=4.0
    validations:
      required: true

  - type: dropdown
    id: delivery
    attributes:
      label: Qualité et intégration
      options:
        - Web / mobile PS1 + intégrer au jeu — recommandé
        - Web / mobile PS1 + catalogue seulement
        - Standard + intégrer au jeu
        - Hero asset + catalogue seulement
        - Vue FPS Web + intégrer sous la caméra
      default: 0
    validations:
      required: true

  - type: checkboxes
    id: confirmation
    attributes:
      label: Vérifications obligatoires
      options:
        - label: Toutes les images représentent exactement la même variante du modèle.
          required: true
        - label: L'objet ou le personnage est entièrement visible et ses dimensions sont réalistes.
          required: true
        - label: Les parties mobiles, détachables ou destructibles sont nommées dans la spécification.
          required: true
        - label: Je confirme les droits d'utilisation des images et la génération dans le dépôt.
          required: true
